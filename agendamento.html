<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendamento - Jessica Melo Nutri</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#a88b36',
            secondary: '#d4b76a',
            accent: '#f5e6c8',
            dark: '#3d3226',
            bacground: '#ede0b9',
            light: '#faf8f3',
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <style>
    body {
      font-family: "Poppins", sans-serif;
    }

    /* Menu Mobile */
    .mobile-menu {
      display: none;
    }

    .mobile-menu.active {
      display: block;
    }
  </style>
</head>

<body class="flex flex-col min-h-screen relative">
  <!-- Background Premium -->
  <div class="fixed inset-0 z-[-1] bg-gradient-to-br from-bacground via-light to-accent"></div>
  <div class="fixed inset-0 z-[-1] bg-white/30 backdrop-blur-[100px]"></div>

  <!-- Header/Navbar -->
  <nav
    class="bg-white/80 backdrop-blur-lg shadow-[0_4px_30px_rgba(0,0,0,0.05)] border-b border-white/50 fixed w-full top-0 z-50 transition-all duration-300">
    <div class="container mx-auto px-4 py-3 sm:py-4">
      <div class="flex justify-between items-center">
        <a href="/index.html" class="transform hover:scale-105 transition-transform duration-300">
          <img src="/assets/images/logo_sem_fundo.png" class="w-32 sm:w-44" alt="Jessica Melo Nutricionista">
        </a>

        <!-- Desktop Menu -->
        <div class="hidden md:flex space-x-6">
          <a href="/index.html" class="text-dark font-medium relative group">
            Site
            <span
              class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full rounded-full"></span>
          </a>
        </div>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden text-dark p-2 hover:bg-gray-100 rounded-lg transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>

      <!-- Mobile Menu Dropdown -->
      <div id="mobile-menu" class="mobile-menu md:hidden mt-4 pb-4 animate-fade-in-up">
        <div class="flex flex-col space-y-2 bg-white/90 rounded-2xl p-4 shadow-lg border border-gray-100">
          <a href="/index.html"
            class="block py-3 px-4 text-dark font-medium bg-gray-50 rounded-xl transition-colors">Site</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-center px-4 pt-28 pb-12 sm:pt-32 relative">
    <!-- Glow Decoration -->
    <div
      class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[30rem] h-[30rem] bg-primary/20 rounded-full blur-3xl animate-pulse-slow z-[-1]">
    </div>

    <div
      class="w-full max-w-md mx-auto bg-white/70 backdrop-blur-md rounded-[2.5rem] p-8 sm:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-white/60 opacity-0 animate-[fadeInUp_0.8s_ease-out_0.2s_forwards]">

      <!-- Header -->
      <header class="text-center mb-8">
        <div class="relative inline-block mb-4">
          <div class="absolute inset-0 bg-gradient-to-tr from-primary to-secondary rounded-full blur opacity-40"></div>
          <img alt="Foto de Jessica"
            class="relative w-28 h-28 sm:w-32 sm:h-32 rounded-full mx-auto object-cover border-4 border-white shadow-xl"
            src="/assets/images/Jessica-site2.jpg" />
        </div>
        <h1 class="text-xl sm:text-2xl font-bold text-dark">
          Jessica Melo
        </h1>
        <p class="text-sm sm:text-base text-gray-600 mt-2 font-medium">
          Nutricionista
        </p>
        <p class="text-xs sm:text-sm text-gray-500 mt-2 px-4 max-w-[250px] mx-auto">
          Te ajudo a ter resultados enquanto a vida acontece
        </p>
      </header>

      <!-- CTA Button -->
      <main class="space-y-4">
        <a class="group relative flex items-center justify-center w-full text-center text-dark py-4 px-6 rounded-2xl transition-all duration-300 font-bold text-base bg-white shadow-lg border border-gray-100 hover:shadow-[0_0_20px_rgba(168,139,54,0.3)] hover:-translate-y-1 overflow-hidden"
          href="https://wa.me/5561993349412">
          <span
            class="absolute inset-0 w-full h-full bg-gradient-to-r from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span>
          <span class="relative flex items-center gap-3">
            <svg class="w-6 h-6 text-green-500" fill="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
            </svg>
            Agende sua consulta
          </span>
        </a>
      </main>

    </div>
  </div>

  <script>
    // Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    if (mobileMenuBtn && mobileMenu) {
      mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('active');
      });
    }
  </script>

</body>

</html>
